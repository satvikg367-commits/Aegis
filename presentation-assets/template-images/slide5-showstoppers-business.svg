<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bgSB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3f8f4"/>
      <stop offset="100%" stop-color="#e4f0e7"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bgSB)"/>
  <text x="80" y="95" fill="#184228" font-family="Arial, sans-serif" font-size="58" font-weight="700">Showstoppers &amp; Business Model</text>

  <rect x="80" y="150" width="700" height="590" rx="24" fill="#fff7ef" stroke="#e7cfb1" stroke-width="3"/>
  <text x="120" y="225" fill="#8a5b21" font-family="Arial, sans-serif" font-size="42" font-weight="700">Showstoppers</text>
  <text x="120" y="300" fill="#6d5334" font-family="Arial, sans-serif" font-size="30" font-weight="500">• Government API integration can require</text>
  <text x="120" y="345" fill="#6d5334" font-family="Arial, sans-serif" font-size="30" font-weight="500">  approval timelines and phased rollout.</text>
  <text x="120" y="415" fill="#6d5334" font-family="Arial, sans-serif" font-size="30" font-weight="500">• Production-scale privacy and audit</text>
  <text x="120" y="460" fill="#6d5334" font-family="Arial, sans-serif" font-size="30" font-weight="500">  compliance need enterprise controls.</text>
  <text x="120" y="530" fill="#6d5334" font-family="Arial, sans-serif" font-size="30" font-weight="500">• Adoption depends on onboarding and</text>
  <text x="120" y="575" fill="#6d5334" font-family="Arial, sans-serif" font-size="30" font-weight="500">  support for senior users.</text>

  <rect x="820" y="150" width="700" height="590" rx="24" fill="#eef8ff" stroke="#b7d8ef" stroke-width="3"/>
  <text x="860" y="225" fill="#1c5b86" font-family="Arial, sans-serif" font-size="42" font-weight="700">Business Model</text>
  <text x="860" y="300" fill="#3b6584" font-family="Arial, sans-serif" font-size="30" font-weight="500">• Partnerships with defence welfare bodies.</text>
  <text x="860" y="370" fill="#3b6584" font-family="Arial, sans-serif" font-size="30" font-weight="500">• Veteran hiring partnerships with companies.</text>
  <text x="860" y="440" fill="#3b6584" font-family="Arial, sans-serif" font-size="30" font-weight="500">• Premium institutional services and</text>
  <text x="860" y="485" fill="#3b6584" font-family="Arial, sans-serif" font-size="30" font-weight="500">  analytics dashboard subscriptions.</text>
  <text x="860" y="555" fill="#3b6584" font-family="Arial, sans-serif" font-size="30" font-weight="500">• Sustainability through service contracts.</text>

  <rect x="80" y="770" width="1440" height="95" rx="18" fill="#163b23"/>
  <text x="120" y="833" fill="#e3f3e8" font-family="Arial, sans-serif" font-size="33" font-weight="700">USP: One secure, veteran-first portal unifying pension + healthcare + career + community in one place.</text>
</svg>
