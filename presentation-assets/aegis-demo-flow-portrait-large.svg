  <text x="105" y="765" fill="#375a7a" font-family="Arial, sans-serif" font-size="34" font-weight="500">Add expense and submit pension request</text>

  <rect x="70" y="870" width="940" height="168" rx="24" fill="#f7fbff" stroke="#cde0f2" stroke-width="3"/>
  <text x="105" y="940" fill="#0f3b63" font-family="Arial, sans-serif" font-size="44" font-weight="700">4. Healthcare</text>
  <text x="105" y="990" fill="#375a7a" font-family="Arial, sans-serif" font-size="34" font-weight="500">Book appointment (telehealth option)</text>

  <rect x="70" y="1095" width="940" height="168" rx="24" fill="#f7fbff" stroke="#cde0f2" stroke-width="3"/>
  <text x="105" y="1165" fill="#0f3b63" font-family="Arial, sans-serif" font-size="44" font-weight="700">5. Career</text>
  <text x="105" y="1215" fill="#375a7a" font-family="Arial, sans-serif" font-size="34" font-weight="500">Show job board and workshop support</text>

  <rect x="70" y="1320" width="940" height="168" rx="24" fill="#f7fbff" stroke="#cde0f2" stroke-width="3"/>
