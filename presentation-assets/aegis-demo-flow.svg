<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <marker id="arr" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#7dd3fc"/>
    </marker>
    <style>
      .title { font: 700 52px Arial, sans-serif; fill: #ffffff; }
      .sub { font: 400 24px Arial, sans-serif; fill: #c7def2; }
      .step { fill: #f8fbff; stroke: #cfe2f5; stroke-width: 2; }
      .num { font: 700 30px Arial, sans-serif; fill: #0b3b66; }
      .txt { font: 600 22px Arial, sans-serif; fill: #23435f; }
      .small { font: 500 19px Arial, sans-serif; fill: #456380; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg3)"/>
  <text x="80" y="90" class="title">AEGIS Demo Flow (3-4 Minutes)</text>
  <text x="80" y="130" class="sub">Use this exact sequence in your hackathon presentation</text>

  <rect x="90" y="200" width="220" height="170" rx="18" class="step"/>
  <text x="115" y="255" class="num">1</text>
  <text x="115" y="295" class="txt">Login</text>
  <text x="115" y="328" class="small">AEGIS + Secure Login</text>

  <rect x="360" y="200" width="220" height="170" rx="18" class="step"/>
  <text x="385" y="255" class="num">2</text>
  <text x="385" y="295" class="txt">Dashboard</text>
  <text x="385" y="328" class="small">Quick metrics overview</text>

  <rect x="630" y="200" width="220" height="170" rx="18" class="step"/>
  <text x="655" y="255" class="num">3</text>
  <text x="655" y="295" class="txt">Pension</text>
  <text x="655" y="328" class="small">Add expense + request</text>

  <rect x="900" y="200" width="220" height="170" rx="18" class="step"/>
  <text x="925" y="255" class="num">4</text>
  <text x="925" y="295" class="txt">Healthcare</text>
  <text x="925" y="328" class="small">Book appointment</text>

  <rect x="1170" y="200" width="220" height="170" rx="18" class="step"/>
  <text x="1195" y="255" class="num">5</text>
  <text x="1195" y="295" class="txt">Career</text>
  <text x="1195" y="328" class="small">Jobs + workshop</text>

  <rect x="360" y="470" width="280" height="180" rx="18" class="step"/>
  <text x="390" y="530" class="num">6</text>
  <text x="390" y="570" class="txt">Community</text>
  <text x="390" y="605" class="small">Post or reply in forum</text>

  <rect x="700" y="470" width="280" height="180" rx="18" class="step"/>
  <text x="730" y="530" class="num">7</text>
  <text x="730" y="570" class="txt">Feedback</text>
  <text x="730" y="605" class="small">Submit issue/suggestion</text>

  <rect x="1040" y="470" width="280" height="180" rx="18" class="step"/>
  <text x="1070" y="530" class="num">8</text>
  <text x="1070" y="570" class="txt">Profile &amp; 2FA</text>
  <text x="1070" y="605" class="small">Accessibility + security</text>

  <line x1="310" y1="285" x2="360" y2="285" stroke="#7dd3fc" stroke-width="4" marker-end="url(#arr)"/>
  <line x1="580" y1="285" x2="630" y2="285" stroke="#7dd3fc" stroke-width="4" marker-end="url(#arr)"/>
  <line x1="850" y1="285" x2="900" y2="285" stroke="#7dd3fc" stroke-width="4" marker-end="url(#arr)"/>
  <line x1="1120" y1="285" x2="1170" y2="285" stroke="#7dd3fc" stroke-width="4" marker-end="url(#arr)"/>

  <line x1="1280" y1="370" x2="1180" y2="470" stroke="#7dd3fc" stroke-width="4" marker-end="url(#arr)"/>
  <line x1="1040" y1="560" x2="980" y2="560" stroke="#7dd3fc" stroke-width="4" marker-end="url(#arr)"/>
  <line x1="700" y1="560" x2="640" y2="560" stroke="#7dd3fc" stroke-width="4" marker-end="url(#arr)"/>

  <text x="80" y="840" style="font: 500 20px Arial, sans-serif; fill: #d7e9fb;">Live demo link: https://aegis-5cc9.onrender.com</text>
</svg>
