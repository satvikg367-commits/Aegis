  <text x="105" y="1440" fill="#375a7a" font-family="Arial, sans-serif" font-size="34" font-weight="500">Post in forum and submit suggestion</text>

  <rect x="70" y="1545" width="940" height="168" rx="24" fill="#f7fbff" stroke="#cde0f2" stroke-width="3"/>
  <text x="105" y="1615" fill="#0f3b63" font-family="Arial, sans-serif" font-size="44" font-weight="700">7. Profile + 2FA</text>
  <text x="105" y="1665" fill="#375a7a" font-family="Arial, sans-serif" font-size="34" font-weight="500">End with accessibility and security settings</text>

